global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    zone: core
    prometheus: prometheus-central

scrape_configs:
  - job_name: federate-zone-a
    honor_labels: true
    metrics_path: /federate
    params:
      match[]:
        - '{__name__="up"}'
        - '{__name__=~"system_.*"}'
        - '{__name__=~"probe_.*"}'
        - '{__name__=~"demo_app_.*"}'
        - '{__name__="agent_collect_errors_total"}'
    static_configs:
      - targets:
          - bigip-mock:19091
        labels:
          source_zone: zone-a

  - job_name: federate-zone-b
    honor_labels: true
    metrics_path: /federate
    params:
      match[]:
        - '{__name__="up"}'
        - '{__name__=~"system_.*"}'
        - '{__name__=~"probe_.*"}'
        - '{__name__=~"demo_app_.*"}'
        - '{__name__="agent_collect_errors_total"}'
    static_configs:
      - targets:
          - bigip-mock:19092
        labels:
          source_zone: zone-b

  - job_name: central-prometheus
    static_configs:
      - targets:
          - localhost:9090
        labels:
          zone: core
