global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    zone: zone-b
    prometheus: prometheus-zone-b

scrape_configs:
  - job_name: agent
    static_configs:
      - targets:
          - agent-zone-b:9100
        labels:
          zone: zone-b
          role: infrastructure

  - job_name: demo-app
    static_configs:
      - targets:
          - demo-app-zone-b:8080
        labels:
          zone: zone-b
          role: application

  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module:
        - http_2xx
    static_configs:
      - targets:
          - http://agent-zone-b:9100/healthz
          - http://demo-app-zone-b:8080/healthz
        labels:
          zone: zone-b
          probe_type: http
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-zone-b:9115

  - job_name: blackbox-tcp
    metrics_path: /probe
    params:
      module:
        - tcp_connect
    static_configs:
      - targets:
          - agent-zone-b:9100
          - demo-app-zone-b:8080
        labels:
          zone: zone-b
          probe_type: tcp
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-zone-b:9115

  - job_name: blackbox-icmp
    metrics_path: /probe
    params:
      module:
        - icmp
    static_configs:
      - targets:
          - agent-zone-b
          - demo-app-zone-b
        labels:
          zone: zone-b
          probe_type: icmp
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-zone-b:9115
